<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Story</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Aptos:wght@300;400;600;700&display=swap');

body{
    margin:0;
    font-family:'Aptos',sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* 🎥 BACKGROUND VIDEO */
.video-bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-3;
}

.video-bg iframe{
    position:absolute;
    top:50%;
    left:50%;
    width:130vw;
    height:130vh;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

/* 🌑 NETFLIX DARK OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
    z-index:-2;
}

/* 🎬 INTRO SCREEN (Netflix style) */
.intro{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3rem;
    font-weight:700;
    letter-spacing:2px;
    background:black;
    animation:fadeOut 2.5s ease forwards;
    z-index:999;
}

@keyframes fadeOut{
    0%{opacity:1;}
    100%{opacity:0; visibility:hidden;}
}

/* 📺 SCREENS */
.screen{
    display:none;
    height:100vh;
    width:100%;
    padding:60px 10vw;
    flex-direction:column;
    justify-content:center;
}

.active{
    display:flex;
}

/* 🎞️ NETFLIX TITLE STYLE */
h1{
    font-size:5rem;
    margin:0;
    font-weight:700;
}

h2{
    font-size:2.5rem;
    margin-bottom:10px;
}

p{
    font-size:1.3rem;
    line-height:1.9;
    max-width:900px;
}

/* 🔘 BUTTON */
button{
    margin-top:20px;
    padding:14px 34px;
    border:none;
    border-radius:40px;
    background:#e50914;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* INPUT */
input{
    padding:14px;
    width:260px;
    border-radius:10px;
    border:none;
    text-align:center;
}

/* 🎭 TYPE REVEAL */
.fadeIn{
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

/* ⏳ COUNTDOWN */
#count{
    font-size:5rem;
    color:#00ffd5;
    font-weight:700;
}

/* ❤️ HEARTS */
.heart{
    position:fixed;
    top:-10px;
    color:red;
    animation:fall 6s linear;
}

@keyframes fall{
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<!-- 🎥 BACKGROUND -->
<div class="video-bg">
    <iframe
        src="https://www.youtube.com/embed/5qap5aO4i9A?autoplay=1&mute=1&loop=1&playlist=5qap5aO4i9A&controls=0&rel=0"
        frameborder="0"
        allow="autoplay">
    </iframe>
</div>

<div class="overlay"></div>

<!-- 🎬 INTRO -->
<div class="intro">NETFLIX PRESENTS</div>

<!-- 🎞️ SCREEN 1 -->
<div id="s1" class="screen active">
<h1 class="fadeIn">For Honey ❤️</h1>
<p class="fadeIn">A story that was never planned… but always meant.</p>
<button onclick="startStory()">Play</button>
</div>

<!-- 🎞️ SCREEN 2 -->
<div id="s2" class="screen">
<h2>Episode 1: Us</h2>
<p class="fadeIn">
We met on Bumble by accident, but nothing after that ever felt accidental.
</p>

<h2>Unlock</h2>

<input id="pass" placeholder="Hint: my name for you ❤️"/>
<br>
<button onclick="unlock()">Unlock</button>

<p id="secret" style="display:none;">You are already part of me.</p>
</div>

<!-- 🎞️ SCREEN 3 -->
<div id="s3" class="screen">
<h1>I am always there for you ❤️</h1>
<div id="count">5</div>
<p id="msg"></p>
</div>

<script>

let locked=false;

function startStory(){
    document.getElementById("s1").style.display="none";
    document.getElementById("s2").classList.add("active");
}

function unlock(){
    const v=document.getElementById("pass").value.trim().toLowerCase();

    if(v==="honey"){
        document.getElementById("secret").style.display="block";

        setTimeout(()=>{
            document.getElementById("s2").style.display="none";
            document.getElementById("s3").classList.add("active");

            if(!locked){
                locked=true;
                playFinal();
            }
        },1000);
    }
}

function playFinal(){
    let c=5;
    const el=document.getElementById("count");
    const msg=document.getElementById("msg");

    let t=setInterval(()=>{
        c--;
        el.innerText=c;

        if(c<=0){
            clearInterval(t);
            el.style.display="none";

            setTimeout(()=>msg.innerText="I am always there for you ❤️", 400);
            setTimeout(()=>msg.innerText="Are you still angry on me?", 2500);
            setTimeout(()=>msg.innerText="I really love you ❤️", 4500);
            setTimeout(()=>msg.innerText="Please call me. I am waiting ❤️", 6500);
        }
    },600);
}

/* hearts */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},500);

</script>

</body>
</html>
